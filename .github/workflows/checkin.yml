name: BallStream Checkin

on:
  schedule:
    # 每天越南时间 07:05（UTC 00:05）
    - cron: '5 0 * * *'

  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run checkin
        run: python sign.py
        env:
          BALL_EMAIL: ${{ secrets.BALL_EMAIL }}
          BALL_PASSWORD: ${{ secrets.BALL_PASSWORD }}
